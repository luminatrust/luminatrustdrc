<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Trust - Inscription</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; --text: #1e293b; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Outfit', sans-serif; overflow: hidden; }
        .bg-slider { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .bg-img { position: absolute; width: 100%; height: 100%; background-size: cover; background-position: center; opacity: 0; transition: opacity 1.5s ease-in-out; }
        .bg-img.active { opacity: 1; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.3); backdrop-filter: blur(8px); z-index: 0; }
        .container { position: relative; z-index: 1; display: flex; justify-content: center; align-items: center; height: 100%; }
        .card { background: rgba(255, 255, 255, 0.95); padding: 40px 30px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 90%; max-width: 380px; text-align: center; overflow-y: auto; max-height: 90vh; }
        .logo { font-size: 28px; font-weight: 600; color: var(--primary); margin-bottom: 5px; }
        .subtitle { color: #64748b; font-size: 14px; margin-bottom: 25px; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 11px; font-weight: 600; color: #94a3b8; margin-left: 5px; text-transform: uppercase; }
        .input-box { display: flex; align-items: center; background: #f1f5f9; border-radius: 15px; border: 1px solid #e2e8f0; padding: 0 15px; }
        .prefix { font-weight: 600; color: var(--text); margin-right: 10px; border-right: 1px solid #cbd5e1; padding-right: 10px; }
        input { border: none; background: transparent; padding: 14px 0; width: 100%; font-family: inherit; font-size: 16px; outline: none; }
        .btn-reg { width: 100%; padding: 16px; border-radius: 15px; border: none; background: var(--primary); color: white; font-weight: 600; font-size: 16px; cursor: pointer; margin-top: 10px; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2); }
    </style>
</head>
<body>
    <div class="bg-slider">
        <div class="bg-img active" style="background-image: url('IMG_3098.jpeg');"></div>
        <div class="bg-img" style="background-image: url('IMG_3099.jpeg');"></div>
        <div class="bg-img" style="background-image: url('IMG_3100.jpeg');"></div>
    </div>
    <div class="overlay"></div>

    <div class="container">
        <div class="card">
            <div class="logo">Lumina Trust</div>
            <div class="subtitle">Créez votre compte investisseur</div>
            
            <div class="form-group">
                <label>Numéro Téléphone</label>
                <div class="input-box">
                    <span class="prefix">+243</span>
                    <input type="tel" id="phone" placeholder="812345678" maxlength="9">
                </div>
            </div>

            <div class="form-group">
                <label>Code PIN (6 chiffres)</label>
                <div class="input-box">
                    <input type="password" id="pin" placeholder="••••••" maxlength="6">
                </div>
            </div>

            <div class="form-group">
                <label>Code de Parrainage (Optionnel)</label>
                <div class="input-box">
                    <input type="text" id="refBy" placeholder="Ex: LT-12345">
                </div>
            </div>

            <button class="btn-reg" onclick="register()">Créer mon compte</button>
            
            <div style="margin-top: 25px; font-size: 14px; color: #64748b;">
                Déjà inscrit ? <a href="index.html" style="color:var(--primary); text-decoration:none; font-weight:600;">Se connecter</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, get, update, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://lumina-invest-default-rtdb.firebaseio.com" };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Slider images logic
        let currentImg = 0;
        const imgs = document.querySelectorAll('.bg-img');
        setInterval(() => {
            imgs[currentImg].classList.remove('active');
            currentImg = (currentImg + 1) % imgs.length;
            imgs[currentImg].classList.add('active');
        }, 5000);

        // Capture du parrain via URL
        const urlParams = new URLSearchParams(window.location.search);
        if(urlParams.has('ref')) document.getElementById('refBy').value = urlParams.get('ref');

        window.register = async () => {
            const rawPhone = document.getElementById('phone').value.trim();
            const phone = "243" + rawPhone;
            const pin = document.getElementById('pin').value.trim();
            const parrainCode = document.getElementById('refBy').value.trim().toUpperCase();

            if(rawPhone.length < 9 || pin.length < 6) return alert("Veuillez remplir les champs correctement.");

            const myRefCode = "LT-" + Math.floor(10000 + Math.random() * 90000);

            try {
                const userRef = ref(db, 'users/' + phone);
                const checkUser = await get(userRef);
                if(checkUser.exists()) return alert("Numéro déjà inscrit.");

                // Inscription du nouvel utilisateur avec bonus de 500 FC
                await set(userRef, {
                    phone: phone,
                    pin: pin,
                    mon_code: myRefCode,
                    parraine_par: parrainCode || "AUCUN",
                    solde: 500, // <--- Nouveau Bonus Réduit
                    total_commissions: 0,
                    date_creation: new Date().toISOString()
                });

                // --- Système de Commission de Parrainage Direct ---
                if(parrainCode && parrainCode !== "AUCUN") {
                    const allUsers = await get(ref(db, 'users'));
                    allUsers.forEach((u) => {
                        const userData = u.val();
                        if(userData.mon_code === parrainCode) {
                            // On ajoute 100 FC de commission au parrain (modifiable)
                            update(ref(db, 'users/' + u.key), {
                                solde: increment(100),
                                total_commissions: increment(100)
                            });
                        }
                    });
                }

                localStorage.setItem('userPhone', phone);
                alert("Bienvenue ! Vous avez reçu 500 FC de bonus.");
                window.location.href = "dashboard.html";

            } catch (e) {
                alert("Erreur de réseau.");
            }
        };
    </script>
</body>
</html>
